<div class="auth-page">
  <div class="auth-card">
    <h1>Reset Password</h1>
    <p class="subtitle">Enter your new password below</p>

    @if (message()) {
      <div class="alert" [class.alert-error]="isError()" [class.alert-success]="!isError()">
        {{ message() }}
      </div>
    }

    <form (ngSubmit)="onSubmit()">
      <!-- Token field (pre-filled from URL, user can also paste it manually) -->
      <div class="form-group">
        <label for="token">Reset Token</label>
        <input
          id="token"
          type="text"
          name="token"
          [ngModel]="token()"
          (ngModelChange)="token.set($event)"
          placeholder="Paste the token from your email"
          required
        />
      </div>

      <div class="form-group">
        <label for="newPassword">New Password</label>
        <input
          id="newPassword"
          type="password"
          name="newPassword"
          [ngModel]="newPassword()"
          (ngModelChange)="newPassword.set($event)"
          placeholder="Minimum 8 characters"
          required
        />
      </div>

      <button type="submit" class="btn-primary" [disabled]="submitting()">
        @if (submitting()) { Resetting... } @else { Reset Password }
      </button>
    </form>

    <div class="auth-links">
      <a routerLink="/login">Back to Sign In</a>
    </div>
  </div>
</div>

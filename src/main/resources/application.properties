# Application name
spring.application.name=amcProject

# Port - Render injects PORT env var; default to 8080 locally
server.port=${PORT:8080}

# Neo4j connection - set these as environment variables
spring.neo4j.uri=neo4j://127.0.0.1:7687
spring.neo4j.authentication.username=neo4j
spring.neo4j.authentication.password=*your_password*

# CORS - which frontend origins are allowed to call the backend
# In production on Render, frontend is served from same origin so this is only needed locally
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:4200}

# Base URL of the app - used to build the password reset link in emails
# In production this should be your Render URL e.g. https://your-app.onrender.com
app.base-url=${APP_BASE_URL:http://localhost:4200}

# Email - "from" address shown in reset emails
app.mail.from=${MAIL_FROM:no-reply@pspl.local}

# Spring Mail (optional - configure if you want real emails)
# If spring.mail.host is blank, the app will just log the reset URL instead of sending email
# spring.mail.host=smtp.gmail.com
# spring.mail.port=587
# spring.mail.username=your-email@gmail.com
# spring.mail.password=your-app-password
# spring.mail.properties.mail.smtp.auth=true
# spring.mail.properties.mail.smtp.starttls.enable=true

# Logging
logging.level.root=INFO
logging.level.org.springframework.data.neo4j.cypher=DEBUG
